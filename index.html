<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Credit Card Spending Tracker</title>
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.3.0"></script>
    
    <!-- Deferred Logic -->
    <script src="logic/expenses_type.js" defer></script>
    <script src="logic/top10_table.js" defer></script>

    <style>
        :root {
            --primary: #1e90ff; /* Shakepay-style Blue */
            --bg-dark: #0f172a;
            --card-bg: rgba(255, 255, 255, 0.05);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            padding: 40px 0;
        }

        h1 {
            font-weight: 600;
            letter-spacing: -1px;
            margin: 0;
        }

        /* --- Controls Card --- */
        .controls-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-size: 0.8rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input[type="date"] {
            background: #1e293b;
            border: 1px solid var(--border);
            color: white;
            padding: 10px 14px;
            border-radius: 8px;
            outline: none;
            transition: border-color 0.3s;
        }

        input[type="date"]:focus {
            border-color: var(--primary);
        }

        .primary-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, background 0.3s;
        }

        .primary-btn:hover {
            background: #0070e0;
            transform: translateY(-2px);
        }

        /* --- Grid Layout --- */
        .data-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
        }

        .data-column {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            overflow: hidden;
        }

        h2 {
            font-size: 1.1rem;
            margin-top: 0;
            color: var(--text-dim);
            border-bottom: 1px solid var(--border);
            padding-bottom: 15px;
        }

        /* --- Styled Tables --- */
        .table-wrapper {
            overflow-x: auto;
            max-height: 400px;
            margin-top: 10px;
        }

        .styled-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
            text-align: left;
        }

        .styled-table thead tr {
            position: sticky;
            top: 0;
            background: #1e293b;
            color: var(--primary);
        }

        .styled-table th, .styled-table td {
            padding: 12px 15px;
            border-bottom: 1px solid var(--border);
        }

        .styled-table tbody tr:hover {
            background: rgba(255, 255, 255, 0.03);
        }

        /* Responsive Fix */
        @media (max-width: 850px) {
            .data-grid { grid-template-columns: 1fr; }
            .controls-card { flex-direction: column; align-items: stretch; }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Shakepay Spending</h1>
            <p style="color: var(--text-dim);">Analyze your transaction history</p>
        </header>

        <main>
            <section class="controls-card">
                <div class="input-group">
                    <label for="start-date">Start Date</label>
                    <input type="date" id="start-date">
                </div>
                
                <div class="input-group">
                    <label for="end-date">End Date</label>
                    <input type="date" id="end-date">
                </div>
                
                <button id="generate-chart-btn" class="primary-btn">Generate Analysis</button>
            </section>

            <section class="data-grid">
                <div class="data-column">
                    <h2>Filtered Transactions</h2>
                    <div class="table-wrapper">
                        <table id="data-table" class="styled-table">
                            <!-- JS content here -->
                        </table>
                    </div>
                </div>

                <div class="data-column">
                    <h2>Top 10 Expenses</h2>
                    <div class="table-wrapper">
                        <table id="topExpensesTable" class="styled-table">
                            <!-- JS content here -->
                        </table>
                    </div>
                </div>
            </section>
        </main>
    </div>

</body>
</html>
