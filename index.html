<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Credit Card Spending Tracker</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.3.0"></script>
    
    <script src="logic/expenses_type.js" defer></script>
    <script src="logic/top10_table.js" defer></script>
    <script src="logic/type.js" defer></script>

    <style>
        :root {
            --primary: #1e90ff; /* Shakepay-style Blue */
            --bg-dark: #0f172a;
            --card-bg: rgba(255, 255, 255, 0.05);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            line-height: 1.6;
        }

        .container {
            max-width: 1400px; /* Widened to fit three columns nicely */
            margin: 0 auto;
        }

        header {
            text-align: center;
            padding: 40px 0;
        }

        h1 {
            font-weight: 600;
            letter-spacing: -1px;
            margin: 0;
        }

        /* --- Controls Card --- */
        .controls-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-size: 0.8rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input[type="date"] {
            background: #1e293b;
            border: 1px solid var(--border);
            color: white;
            padding: 10px 14px;
            border-radius: 8px;
            outline: none;
            transition: border-color 0.3s;
        }

        input[type="date"]:focus {
            border-color: var(--primary);
        }

        .primary-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, background 0.3s;
        }

        .primary-btn:hover {
            background: #0070e0;
            transform: translateY(-2px);
        }

        /* --- Updated Grid Layout for 3 Columns --- */
        .data-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 24px;
        }

        .data-column {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 20px;
            overflow: hidden;
        }

        .column-header-row {
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 1px solid var(--border); 
            padding-bottom: 15px;
        }

        h2 {
            font-size: 1.1rem;
            margin: 0;
            color: var(--text-dim);
        }

        .copy-btn {
            padding: 6px 12px; 
            font-size: 0.8rem;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid var(--border);
        }

        .copy-btn:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        /* --- Styled Tables --- */
        .table-wrapper {
            overflow-x: auto;
            max-height: 400px;
            margin-top: 10px;
        }

        .styled-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
            text-align: left;
        }

        .styled-table thead tr {
            position: sticky;
            top: 0;
            background: #1e293b;
            color: var(--primary);
        }

        .styled-table th, .styled-table td {
            padding: 12px 15px;
            border-bottom: 1px solid var(--border);
        }

        .styled-table tbody tr:hover {
            background: rgba(255, 255, 255, 0.03);
        }

        /* Responsive Fix */
        @media (max-width: 1100px) {
            .data-grid { grid-template-columns: 1fr; }
            .controls-card { flex-direction: column; align-items: stretch; }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>Shakepay Spending</h1>
            <p style="color: var(--text-dim);">Analyze your transaction history</p>
        </header>

        <main>
            <section class="controls-card">
                <div class="input-group">
                    <label for="start-date">Start Date</label>
                    <input type="date" id="start-date">
                </div>
                
                <div class="input-group">
                    <label for="end-date">End Date</label>
                    <input type="date" id="end-date">
                </div>
                
                <button id="generate-chart-btn" class="primary-btn">Generate Analysis</button>
            </section>

            <section class="data-grid">
                <div class="data-column">
                    <div class="column-header-row">
                        <h2>Filtered Transactions</h2>
                        <button class="primary-btn copy-btn" onclick="copyTableToClipboard('data-table', this)">Copy Table</button>
                    </div>
                    <div class="table-wrapper">
                        <table id="data-table" class="styled-table"></table>
                    </div>
                </div>

                <div class="data-column">
                    <div class="column-header-row">
                        <h2>Top 10 Expenses</h2>
                        <button class="primary-btn copy-btn" onclick="copyTableToClipboard('topExpensesTable', this)">Copy Table</button>
                    </div>
                    <div class="table-wrapper">
                        <table id="topExpensesTable" class="styled-table"></table>
                    </div>
                </div>

                <div class="data-column">
                    <div class="column-header-row">
                        <h2>Expense Breakdown</h2>
                        <button class="primary-btn copy-btn" onclick="copyTableToClipboard('expenseTypeTable', this)">Copy Table</button>
                    </div>
                    <div class="table-wrapper">
                        <table id="expenseTypeTable" class="styled-table"></table>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script>
        function copyTableToClipboard(tableId, buttonElement) {
            var table = document.getElementById(tableId);
            if (!table || table.rows.length === 0) {
                alert("Please click 'Generate Analysis' to load data before copying.");
                return;
            }

            var rows = Array.from(table.rows);
            var textToCopy = rows.map(function(row) {
                var cells = Array.from(row.cells);
                return cells.map(function(cell) {
                    // Strips the $ layout symbol so it pastes cleanly into Sheets numeric parsing fields
                    return cell.textContent.trim().replace('$', '');
                }).join('\t'); // Tab character facilitates instant grid alignment in Google Sheets
            }).join('\n');

            navigator.clipboard.writeText(textToCopy).then(function() {
                var originalText = buttonElement.textContent;
                buttonElement.textContent = "Copied!";
                buttonElement.style.background = "#10b981"; // Temporary Green success state
                buttonElement.style.borderColor = "#10b981";
                
                setTimeout(function() {
                    buttonElement.textContent = originalText;
                    buttonElement.style.background = ""; // Returns back to standard CSS configurations
                    buttonElement.style.borderColor = "";
                }, 1200);
            }).catch(function(err) {
                console.error("Clipboard operational execution failure: ", err);
            });
        }
    </script>
</body>
</html>
